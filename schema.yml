components:
  schemas:
    ActionEnum:
      enum:
      - create
      - update
      - delete
      - confirm
      type: string
      description: |-
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `confirm` - Confirm
    Application:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          title: To'liq ism sharif
          maxLength: 255
        birth_date:
          type: string
          format: date
          title: Tug'ilgan sana
        is_student:
          type: boolean
          title: Talabami?
        university:
          type: string
          nullable: true
          title: O'qish joyi va kursi
          maxLength: 255
        region:
          type: integer
          title: Viloyat
        phone:
